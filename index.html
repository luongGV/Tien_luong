<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Lương Tham Khảo</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #fcf8ee; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
        }
        .container { max-width: 400px; width: 100%; background: white; border: 1px solid #ddd; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h3 { text-align: center; color: #cc3333; margin-top: 0; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; font-weight: bold; color: #003366; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px; border: 1.5px solid #003366; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        .row { display: flex; gap: 10px; }
        .row .form-group { flex: 1; }
        .btn-calc { width: 100%; background: #002d62; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .result-box { border: 2px dashed #003366; border-radius: 8px; padding: 15px; margin-top: 15px; background-color: #fffdf5; font-size: 14px; }
        .result-line { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .text-bold { font-weight: bold; }
        .text-green { color: green; font-weight: bold; }
        .text-red { color: red; }
    </style>
</head>
<body>

<div class="container">
    <h3>Tiện ích tính thu nhập cho GV</h3>
    
    <div class="form-group">
        <label>Lương cơ sở (VNĐ)</label>
        <input type="number" id="luongCoSo" value="2530000">
    </div>

    <div class="row">
        <div class="form-group">
            <label>Hệ số lương</label>
            <input type="number" id="heSoLuong" step="0.01" value="0.00">
        </div>
        <div class="form-group">
            <label>PC Ưu đãi (%)</label>
            <input type="number" id="pcUuDai" value="...">
        </div>
    </div>

    <div class="row">
        <div class="form-group">
            <label>PC Chức vụ (Hệ số)</label>
            <input type="number" id="pcChucVu" step="0.01" value="0.00">
        </div>
        <div class="form-group">
            <label>PC Khu vực (Hệ số)</label>
            <input type="number" id="pcKhuVuc" step="0.01" value="0.0">
        </div>
    </div>

    <div class="row">
        <div class="form-group">
            <label>PC Trách nhiệm (Hệ số)</label>
            <input type="number" id="pcTrachNhiem" step="0.01" value="0.00">
        </div>
        <div class="form-group">
            <label>PC Độc hại (Hệ số)</label>
            <input type="number" id="pcDocHai" step="0.01" value="0.00">
        </div>
    </div>

    <div class="row">
        <div class="form-group">
            <label>PC Thâm niên (%)</label>
            <input type="number" id="pcThamNien" value="36">
        </div>
        <div class="form-group">
            <label>PC Vượt khung (%)</label>
            <input type="number" id="pcVuotKhung" value="0">
        </div>
    </div>
	
    <button class="btn-calc" onclick="tinhLuong()">TỔNG THU NHẬP</button>

    <div class="result-box" id="ketQua" style="display:none;">
        <div class="result-line"><span>Lương chính:</span><span id="rLuongChinh"></span></div>
        <div class="result-line"><span>Phụ cấp ưu đãi:</span><span id="rPcUuDai"></span></div>
        <div class="result-line"><span>Phụ cấp chức vụ:</span><span id="rPcChucVu"></span></div>
        <div class="result-line"><span>Phụ cấp thâm niên:</span><span id="rPcThamNien"></span></div>
        <div class="result-line"><span>Phụ cấp khu vực:</span><span id="rPcKhuVuc"></span></div>
        <div class="result-line"><span>Phụ cấp trách nhiệm:</span><span id="rPcTrachNhiem"></span></div>
        <div class="result-line"><span>Phụ cấp độc hại:</span><span id="rPcDocHai"></span></div>
        <hr>
        <div class="result-line text-bold text-green"><span>TỔNG THU NHẬP TRƯỚC ĐÓNG BH:</span><span id="rTongGop"></span></div>
        <div class="result-line text-red"><span>Trừ BHYT (1.5%):</span><span id="rBHYT"></span></div>
        <div class="result-line text-red"><span>Trừ BHXH, BHTN (9%):</span><span id="rBHXH"></span></div>
        <hr>
        <div class="result-line text-bold text-red" style="font-size: 16px;"><span>TỔNG THU NHẬP CÒN LẠI:</span><span id="rThucNhan"></span></div>
    </div>
</div>

<script>
function formatVND(num) {
    return Math.round(num).toLocaleString('vi-VN') + ' đ';
}

function tinhLuong() {
    // Lấy dữ liệu đầu vào
    const lcs = parseFloat(document.getElementById('luongCoSo').value) || 0;
    const hsl = parseFloat(document.getElementById('heSoLuong').value) || 0;
    const pcuuDaiPct = parseFloat(document.getElementById('pcUuDai').value) || 0;
    const pccvHeso = parseFloat(document.getElementById('pcChucVu').value) || 0;
    const pckvHeso = parseFloat(document.getElementById('pcKhuVuc').value) || 0;
    const pctnHeso = parseFloat(document.getElementById('pcTrachNhiem').value) || 0; // Thêm hệ số trách nhiệm
    const pcdhHeso = parseFloat(document.getElementById('pcDocHai').value) || 0;    // Thêm hệ số độc hại
    const pctnPct = parseFloat(document.getElementById('pcThamNien').value) || 0;
    const pcvkPct = parseFloat(document.getElementById('pcVuotKhung').value) || 0;

    // Tính toán các khoản dựa trên lương cơ sở
    const luongChinh = hsl * lcs;
    const pcChucVu = pccvHeso * lcs;
    const pcKhuVuc = pckvHeso * lcs;
    const pcTrachNhiem = pctnHeso * lcs; // Tính tiền phụ cấp trách nhiệm
    const pcDocHai = pcdhHeso * lcs;       // Tính tiền phụ cấp độc hại
    
    // Gốc tính phụ cấp ưu đãi & thâm niên (gồm lương chính + chức vụ + vượt khung nếu có)
    const gocTinhPhuCap = luongChinh + pcChucVu + (luongChinh * pcvkPct / 100);
    
    const pcUuDai = gocTinhPhuCap * (pcuuDaiPct / 100);
    const pcThamNien = gocTinhPhuCap * (pctnPct / 100);
    
    // Cộng thêm trách nhiệm và độc hại vào tổng thu nhập gộp
    const tongLuongGop = luongChinh + pcUuDai + pcChucVu + pcThamNien + pcKhuVuc + pcTrachNhiem + pcDocHai;

    // Gốc tính bảo hiểm (Trách nhiệm có tính đóng BHXH tùy loại chức danh công việc, ở đây tạm thời gom theo nhóm lương chính + chức vụ + thâm niên)
    const gocTinhBaoHiem = luongChinh + pcChucVu + pcThamNien;
    const bhyt = gocTinhBaoHiem * 0.015;
    const bhxh_bhtn = gocTinhBaoHiem * 0.09;
    
    const thucNhan = tongLuongGop - bhyt - bhxh_bhtn;

    // Hiển thị kết quả ra màn hình
    document.getElementById('rLuongChinh').innerText = formatVND(luongChinh);
    document.getElementById('rPcUuDai').innerText = formatVND(pcUuDai);
    document.getElementById('rPcChucVu').innerText = formatVND(pcChucVu);
    document.getElementById('rPcThamNien').innerText = formatVND(pcThamNien);
    document.getElementById('rPcKhuVuc').innerText = formatVND(pcKhuVuc);
    document.getElementById('rPcTrachNhiem').innerText = formatVND(pcTrachNhiem);
    document.getElementById('rPcDocHai').innerText = formatVND(pcDocHai);
    document.getElementById('rTongGop').innerText = formatVND(tongLuongGop);
    document.getElementById('rBHYT').innerText = "-" + formatVND(bhyt);
    document.getElementById('rBHXH').innerText = "-" + formatVND(bhxh_bhtn);
    document.getElementById('rThucNhan').innerText = formatVND(thucNhan);

    document.getElementById('ketQua').style.display = 'block';
}
</script>

</body>
</html>
